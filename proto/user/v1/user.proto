syntax = "proto3";

package user.v1;

option go_package = "github.com/ezcnrmn/vaito/gen/go/user";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc UpdateUserPassword(UpdateUserPasswordRequest) returns (UpdateUserPasswordResponse) {}
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {}

  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse) {}
  rpc GetUserIDByToken(GetUserIDByTokenRequest) returns (GetUserIDByTokenResponse) {}
  rpc GetUserPermissionsByToken(GetUserPermissionsByTokenRequest) returns (GetUserPermissionsByTokenResponse) {}
}

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string role_name = 4;
}

message Token {
  string token = 1;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}
message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  int64 id = 1;
  optional string name = 2;
  optional string email = 3;

  Token token = 4;
}
message UpdateUserResponse {
  User user = 1;
}

message UpdateUserPasswordRequest {
  int64 id = 1;
  string password = 2;

  Token token = 3;
}
message UpdateUserPasswordResponse {}

message GetUserRequest {
  int64 id = 1;
}
message GetUserResponse {
  User user = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}
message AuthenticateUserResponse {
  Token token = 1;
}

message GetUserIDByTokenRequest {
  Token token = 1;
}
message GetUserIDByTokenResponse {
  int64 user_id = 1;
}

message GetUserPermissionsByTokenRequest {
  Token token = 1;
}
message GetUserPermissionsByTokenResponse {
  int64 user_id = 1;

  repeated string permissions = 2;
}
