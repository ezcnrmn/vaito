syntax = "proto3";

package listing.v1;

option go_package = "github.com/ezcnrmn/vaito/gen/go/listing";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service Listing {
  rpc CreateListing (CreateListingRequest) returns (ListingResponse) {}
  rpc UpdateListing (UpdateListingRequest) returns (ListingResponse) {}
  rpc DeleteListing (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}

  rpc GetListing (GetListingRequest) returns (ListingResponse) {}
  rpc GetUserListing (AuthenticatedListingRequest) returns (ListingResponse) {}
  rpc GetActiveListings (GetActiveListingsRequest) returns (ListingPaginatedResponse) {}
  rpc GetModerationListings (GetModerationListingsRequest) returns (ListingPaginatedResponse) {}
  rpc GetListingsByUser (GetListingsByUserRequest) returns (ListingPaginatedResponse) {}

  rpc SendListingToModeration (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}
  rpc ActivateListing (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}
  rpc DeactivateListing (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}

  rpc ActivateListingByModeration (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}
  rpc DeactivateListingByModeration (AuthenticatedListingRequest) returns (google.protobuf.Empty) {}

  rpc GetCategories (google.protobuf.Empty) returns (CategoriesResponse) {}
}

message AuthenticationRequest {
  bytes token = 1;
}

message CreateListingRequest {
  AuthenticationRequest authentication = 1;

  string title = 2;
  string description = 3;
  int64 category_id = 4;
  int64 price = 5;
}

message ListingResponse {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  int64 user_id = 5;
  string status = 6;
  int64 price = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp published_at = 9;
}

message UpdateListingRequest {
  AuthenticationRequest authentication = 1;

  int64 id = 2;

  optional string title = 3;
  optional string description = 4;
  optional int64 category_id = 5;
  optional int64 price = 6;
}

message AuthenticatedListingRequest {
  AuthenticationRequest authentication = 1;

  int64 id = 2;
}

message GetListingRequest {
  int64 id = 1;
}

message GetActiveListingsRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListingPaginatedResponse {
  repeated ListingResponse items = 1;

  PaginationResponse pagination = 2;
}

message GetModerationListingsRequest {
  AuthenticationRequest authentication = 1;

  int32 page = 2;
  int32 size = 3;
}

message PaginationResponse {
  int32 page = 1;
  int32 size = 2;
  int32 total = 3;
}

message GetListingsByUserRequest {
  AuthenticationRequest authentication = 1;

  int64 id = 2;

  message PaginationRequest {
    int32 page = 1;
    int32 size = 2;
  }

  PaginationRequest pagination = 3;
}

message CategoriesResponse {
  message Category {
    int64 id = 1;
    string name = 2;
  }

  repeated Category categories = 1;
}

