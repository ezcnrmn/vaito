syntax = "proto3";
package vaito.v1;

option go_package = "github.com/ezcnrmn/vaito/gen/go/vaito";

service Listing {
  rpc CreateListing (CreateListingRequest) returns (CreateListingResponse) {}
}

message CreateListingRequest {
  string title = 1;
  string description = 2;
  int32 category_id = 3;
  int32 price = 4;
}

message CreateListingResponse {
  int64 id = 1;
}
